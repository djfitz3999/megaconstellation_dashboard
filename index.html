<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Mega-Constellation Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<canvas id="starfield"></canvas>

<div id="stars"></div>

<div class="container">

<h1>Mega-Constellation Tracker</h1>

<div class="panel">

<h2>SpaceX Starlink</h2>
<div id="starlink-count" class="counter">0</div>

</div>

<div class="panel">

<h2>Amazon Kuiper</h2>
<div id="kuiper-count" class="counter">0</div>

</div>

<div class="panel">

<h2>Qianfan (千帆)</h2>
<div id="qianfan-count" class="counter">0</div>

</div>

<div class="panel">

<h2>Guowang (国网)</h2>
<div id="guowang-count" class="counter">0</div>

</div>

<div id="update-info">
  Last updated: <span id="lastUpdate">--</span><br>
  Next update in: <span id="nextUpdate">--</span>
</div>

<button id="update-btn">Force Update</button>

<p class="source">

Data Source:
<a href="https://planet4589.org/index.html" target="_blank">
Jonathan's Space Report
</a>

</p>

<p class="author">
  Created by David Fitzpatrick, Ph.D.<br>
  <a href="mailto:djf84@georgetown.edu" class="email-link">djf84@georgetown.edu</a>
</p>

</div>

<script src="src.js"></script>

</body>

</html>
